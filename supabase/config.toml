# Trimark — Supabase project config
# Doc: https://supabase.com/docs/guides/local-development/cli/config
project_id = "trimark"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "52428800"  # 50MB conforme PRD §19 (mitigação storage)

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = false  # Convites apenas via Edge Function client-invite

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false  # Confirmação por convite, não auto

[edge_runtime]
enabled = true
policy = "oneshot"

[functions]
verify_jwt = true
